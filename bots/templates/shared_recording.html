<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recording - {{ bot.bot_name|default:"Enregistrement de reunion" }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 960px; width: 100%; padding: 2rem 1rem; }
        .header { margin-bottom: 1.5rem; }
        .header h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.25rem; }
        .header p { color: #888; font-size: 0.875rem; }
        .video-wrapper { background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 1.5rem; }
        video { width: 100%; display: block; }
        .actions { display: flex; gap: 0.75rem; }
        .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.625rem 1.25rem; border-radius: 6px; font-size: 0.875rem; font-weight: 500; text-decoration: none; cursor: pointer; border: none; transition: background 0.2s; }
        .btn-primary { background: #2563eb; color: #fff; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-secondary { background: #262626; color: #d4d4d4; border: 1px solid #404040; }
        .btn-secondary:hover { background: #333; }
        .expired { text-align: center; padding: 4rem 1rem; }
        .expired h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .expired p { color: #888; }
        .footer { margin-top: 2rem; text-align: center; color: #555; font-size: 0.75rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{ bot.bot_name|default:"Enregistrement de reunion" }}</h1>
            <p>Partage le {{ shared_link.created_at|date:"M d, Y" }}</p>
        </div>

        <div class="video-wrapper">
            <video controls preload="metadata">
                <source src="{{ video_url }}" type="video/mp4">
                Votre navigateur ne supporte pas la lecture video.
            </video>
        </div>

        {% if shared_link.allow_download %}
        <div class="actions">
            <a href="{% url 'shared_recording_download' token=shared_link.token %}" class="btn btn-primary">
                Telecharger l'enregistrement
            </a>
        </div>
        {% endif %}

        <div class="footer">
        </div>
    </div>
</body>
</html>
