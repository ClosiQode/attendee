<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lien indisponible</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .container { max-width: 500px; width: 100%; padding: 2rem 1rem; text-align: center; }
        .icon { font-size: 4rem; margin-bottom: 1.5rem; opacity: 0.6; }
        h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.75rem; }
        p { color: #888; font-size: 1rem; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔗</div>
        <h1>Ce lien n'est plus disponible</h1>
        <p>Ce lien de partage a expire ou a ete desactive par son proprietaire.</p>
    </div>
</body>
</html>
